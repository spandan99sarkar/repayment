<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IDCOL Loan Repayment Engine</title>
<style>
:root{
  --bg:#eef1f6; --navy:#0b1f3a; --navy2:#13294b; --thead:#1c2b4a;
  --card:#ffffff; --line:#d7dde8; --line2:#e7ecf3;
  --accent:#1a56b0; --accent2:#2b6fd6; --ink:#1a2435; --muted:#697587;
  --good:#0f6e4d; --warn:#8a5a0b; --bad:#9b1c1c;
  --blue:#eef4ff; --yellow:#fffaeb; --green:#eefcf3;
  --row1:#fafbfe; --row2:#ffffff;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{font-family:"Segoe UI",system-ui,-apple-system,Roboto,Arial,sans-serif;background:var(--bg);
  color:var(--ink);font-size:13px;line-height:1.4;display:flex;flex-direction:column;height:100vh;overflow:hidden}
.num{font-variant-numeric:tabular-nums}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit;font-size:12px}

header{background:linear-gradient(180deg,var(--navy),var(--navy2));color:#fff;padding:0 16px;height:52px;
  display:flex;align-items:center;gap:14px;flex:0 0 auto;box-shadow:0 2px 8px rgba(11,31,58,.25);z-index:30}
header .logo{font-weight:700;font-size:15px;letter-spacing:.3px;display:flex;align-items:center;gap:9px}
header .logo .mark{width:26px;height:26px;border-radius:6px;background:linear-gradient(135deg,#2b6fd6,#5b9bff);
  display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800}
header .sub{font-size:11px;color:#a9bcd8;font-weight:400}
header .spacer{flex:1}
header .hbtn{background:#1d3a63;color:#fff;border:1px solid #2c4d7d;padding:7px 13px;border-radius:7px;font-size:12px;font-weight:600}
header .hbtn:hover{background:#27497a}
header .hbtn.primary{background:var(--accent2);border-color:#3f82e6}
header .hbtn.primary:hover{background:#3a82ea}
header select{background:#0f274a;color:#fff;border:1px solid #2c4d7d;padding:6px 8px;border-radius:6px;max-width:240px}

.app{display:flex;flex:1;min-height:0}
.panel-left{width:340px;flex:0 0 340px;background:var(--card);border-right:1px solid var(--line);overflow-y:auto}
.center{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden}
.panel-right{width:300px;flex:0 0 300px;background:var(--card);border-left:1px solid var(--line);overflow-y:auto}

.acc{border-bottom:1px solid var(--line2)}
.acc>.head{padding:11px 14px;background:#f4f7fb;font-weight:700;font-size:12px;color:var(--navy);cursor:pointer;
  display:flex;align-items:center;justify-content:space-between;user-select:none}
.acc>.head:hover{background:#eef3f9}
.acc>.head .chev{transition:transform .15s;color:var(--muted)}
.acc.collapsed>.head .chev{transform:rotate(-90deg)}
.acc>.body{padding:12px 14px}
.acc.collapsed>.body{display:none}
.fld{margin-bottom:9px}
.fld label{display:block;font-size:11px;color:var(--muted);margin-bottom:3px;font-weight:600}
.fld input,.fld select{width:100%;padding:6px 8px;border:1px solid var(--line);border-radius:6px;background:#fff}
.fld input:focus,.fld select:focus{outline:none;border-color:var(--accent2);box-shadow:0 0 0 2px rgba(43,111,214,.15)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
.chk{display:flex;align-items:flex-start;gap:7px;margin:7px 0;font-size:12px}
.chk input{width:auto;margin-top:2px}
.mini-tbl{width:100%;border-collapse:collapse;font-size:11px;margin-top:4px}
.mini-tbl th{background:#f0f4fa;color:var(--muted);font-weight:600;padding:4px 5px;text-align:left;border-bottom:1px solid var(--line)}
.mini-tbl td{padding:2px 3px;border-bottom:1px solid var(--line2)}
.mini-tbl input{width:100%;padding:4px 5px;border:1px solid var(--line);border-radius:5px}
.mini-tbl .del{background:#fdecec;color:var(--bad);border:1px solid #f3c9c9;border-radius:5px;padding:3px 7px;font-weight:700;line-height:1}
.addbtn{margin-top:7px;width:100%;background:#eef4ff;color:var(--accent);border:1px dashed #9bbcf0;padding:6px;border-radius:6px;font-weight:600;font-size:12px}
.addbtn:hover{background:#e2edff}
.note{font-size:10.5px;color:var(--muted);margin-top:6px;line-height:1.45}
.hint{font-size:10px;color:var(--muted);font-style:italic;margin-top:4px}

.tabbar{display:flex;gap:2px;background:#e7ecf3;padding:6px 10px 0;flex:0 0 auto;align-items:flex-end}
.tab{padding:8px 16px;border:1px solid transparent;border-bottom:none;border-radius:8px 8px 0 0;font-weight:600;color:var(--muted);font-size:12.5px;background:transparent}
.tab.active{background:var(--card);color:var(--navy);border-color:var(--line)}
.tab:hover:not(.active){color:var(--navy)}
.tabspacer{flex:1}
.viewbar{display:flex;align-items:center;gap:8px;padding-right:8px;font-size:11px;color:var(--muted)}
.viewbar input,.viewbar select{padding:4px 6px;border:1px solid var(--line);border-radius:5px}
.viewbar .vb{background:#1d3a63;color:#fff;border:1px solid #2c4d7d;padding:5px 10px;border-radius:6px;font-size:11px;font-weight:600}

.content{flex:1;overflow:auto;padding:14px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:10px}
.empty .big{font-size:40px}
.empty h2{margin:0;color:var(--navy)}

.tbl-wrap{overflow:auto;border:1px solid var(--line);border-radius:9px;background:#fff}
table.sched{border-collapse:collapse;width:100%;font-size:11.5px}
table.sched th{position:sticky;top:0;background:var(--thead);color:#fff;font-weight:600;padding:8px 9px;text-align:right;white-space:nowrap;z-index:2;border-right:1px solid #2a3c5e}
table.sched th.l{text-align:left}
table.sched td{padding:6px 9px;text-align:right;white-space:nowrap;border-bottom:1px solid var(--line2);border-right:1px solid #f1f4f9}
table.sched td.l{text-align:left}
table.sched tbody tr:nth-child(odd){background:var(--row1)}
table.sched tbody tr.pay{background:var(--blue)}
table.sched tbody tr.pay:hover{background:#e2ecff}
table.sched tbody tr.clickable{cursor:pointer}
table.sched tr.daily-hdr td{background:#0e2647;color:#cdddf2;font-weight:600;font-size:10.5px;border-color:#1b3a63}
table.sched tr.dayrow td{background:#fff}
table.sched tr.dayrow:nth-child(even) td{background:#fafcff}
table.sched tr.dayrow.weekend td{background:var(--yellow)}
table.sched tr.dayrow.holiday td{color:var(--warn)}
table.sched tr.dayrow.disb td{background:var(--green)}
table.sched tr.foot td{background:#f0f4fa;font-weight:700;border-top:2px solid var(--thead);position:sticky;bottom:0}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9.5px;font-weight:700;letter-spacing:.2px}
.tag.cap{background:#ede7ff;color:#5b3bb5}
.tag.grace{background:#e6f0ff;color:#2b5fae}
.tag.pay{background:#dbeafe;color:#1e4fa0}
.tag.disb{background:#d9f7e6;color:#0f6e4d}
.zero{color:#c2cad6}

.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.card{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px 16px}
.card .k{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.card .v{font-size:21px;font-weight:700;color:var(--navy);margin-top:5px}
.card .sub{font-size:11px;color:var(--muted);margin-top:3px}
.card.accent{background:linear-gradient(135deg,#0b1f3a,#1d3e6e);border:none}
.card.accent .k{color:#9fb6d8}.card.accent .v{color:#fff}.card.accent .sub{color:#bcccdf}
.chartbox{background:#fff;border:1px solid var(--line);border-radius:11px;padding:14px;margin-bottom:14px}
.chartbox h3{margin:0 0 10px;font-size:13px;color:var(--navy)}

.rp-tabs{display:flex;border-bottom:1px solid var(--line)}
.rp-tab{flex:1;padding:10px;text-align:center;font-weight:600;font-size:12px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent}
.rp-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.rp-body{padding:14px}
.rp-day{font-weight:700;color:var(--navy);font-size:14px;margin-bottom:2px}
.rp-sub{font-size:11px;color:var(--muted);margin-bottom:12px}
.evt{border:1px solid var(--line);border-radius:8px;margin-bottom:8px;overflow:hidden}
.evt>.eh{display:flex;align-items:center;gap:8px;padding:8px 10px;background:#f6f9fd;font-size:12px;font-weight:600;cursor:pointer}
.evt .ebody{padding:9px 10px;border-top:1px solid var(--line2);display:none}
.evt.open .ebody{display:block}
.applybtn{width:100%;background:var(--accent);color:#fff;border:none;padding:9px;border-radius:7px;font-weight:700;margin-top:6px}
.applybtn:hover{background:#15499a}
.ver{border:1px solid var(--line);border-radius:8px;padding:9px 11px;margin-bottom:8px;font-size:12px}
.ver .vt{font-weight:700;color:var(--navy)}
.ver .vd{font-size:10.5px;color:var(--muted);margin:2px 0 6px}
.ver .vb{display:flex;gap:6px}
.ver .vb button{flex:1;font-size:11px;padding:4px;border-radius:5px;border:1px solid var(--line);background:#f6f9fd;font-weight:600}
.ver.active{border-color:var(--accent);box-shadow:0 0 0 2px rgba(26,86,176,.12)}
.badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:700;background:#eef4ff;color:var(--accent)}

.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 18px;
  border-radius:8px;font-size:12.5px;box-shadow:0 6px 20px rgba(0,0,0,.3);z-index:100;opacity:0;transition:opacity .2s;pointer-events:none;max-width:560px}
.toast.show{opacity:1}
.statusline{padding:5px 14px;background:#f4f7fb;border-top:1px solid var(--line);font-size:11px;color:var(--muted);flex:0 0 auto;display:flex;gap:16px;flex-wrap:wrap}
.statusline b{color:var(--navy)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#c3cdda;border-radius:5px}
::-webkit-scrollbar-thumb:hover{background:#aab6c6}
</style>
</head>
<body>
<header>
  <div class="logo"><span class="mark">৳</span><div>IDCOL Repayment Engine<div class="sub">Daily-basis accrual · holiday-aware · versioned · 16 reference loans</div></div></div>
  <div class="spacer"></div>
  <select id="exampleSel" title="Load a worked example (reference param sets)">
    <option value="">— Load example —</option>
  </select>
  <select id="versionSel" title="Active version" style="display:none"></select>
  <button class="hbtn" id="saveVerBtn">Save Version</button>
  <button class="hbtn primary" id="computeBtn">▶ Compute Schedule</button>
</header>

<div class="app">
  <aside class="panel-left" id="leftPanel"></aside>
  <section class="center">
    <div class="tabbar">
      <button class="tab active" data-tab="periodic">Periodic Schedule</button>
      <button class="tab" data-tab="daily">Daily Schedule</button>
      <button class="tab" data-tab="summary">Summary</button>
      <div class="tabspacer"></div>
      <div class="viewbar" id="viewbar"></div>
    </div>
    <div class="content" id="content">
      <div class="empty">
        <div class="big">📊</div>
        <h2>No schedule yet</h2>
        <div>Fill the loan parameters on the left (or load an example),<br>then press <b>▶ Compute Schedule</b>.<br><br>
        Click any periodic row to expand its <b>daily accrual</b>.</div>
      </div>
    </div>
    <div class="statusline" id="statusline" style="display:none"></div>
  </section>
  <aside class="panel-right">
    <div class="rp-tabs">
      <div class="rp-tab active" data-rt="event">Lifecycle Events</div>
      <div class="rp-tab" data-rt="versions">Versions</div>
    </div>
    <div class="rp-body" id="rpBody"></div>
  </aside>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================================
   IDCOL LOAN REPAYMENT ENGINE — JS port of the provided Python reference
   (generate_repayment_schedule / accrue_interest / get_rate_at_date), extended
   with holiday business-day adjustment (preceding/succeeding), due-date day-count
   conventions, multi-disbursement input, and a full daily-basis accrual view.
   ============================================================================ */

/* ---------- Excel serial dates (base 1899-12-30, identical to Python) ---------- */
const EPOCH=Date.UTC(1899,11,30), DAYMS=86400000;
function serialToDate(s){return new Date(EPOCH+s*DAYMS);}
function isoToSerial(iso){if(!iso)return null;const[y,m,d]=iso.split('-').map(Number);return Math.round((Date.UTC(y,m-1,d)-EPOCH)/DAYMS);}
function serialToISO(s){return serialToDate(s).toISOString().slice(0,10);}
const MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const DOW=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
function fmtDate(s){const d=serialToDate(s);return `${String(d.getUTCDate()).padStart(2,'0')}-${MO[d.getUTCMonth()]}-${d.getUTCFullYear()}`;}
function dow(s){return serialToDate(s).getUTCDay();}
function dateToExcel(y,m,d){return Math.round((Date.UTC(y,m-1,d)-EPOCH)/DAYMS);}
function addMonthsSerial(s,n,day){const d=serialToDate(s);let y=d.getUTCFullYear(),mo=d.getUTCMonth()+n;
  y+=Math.floor(mo/12);mo=((mo%12)+12)%12;const useDay=day||d.getUTCDate();
  const last=new Date(Date.UTC(y,mo+1,0)).getUTCDate();return dateToExcel(y,mo+1,Math.min(useDay,last));}

/* ---------- Number formatting ---------- */
function fmt(n,dec=2){
  if(n===null||n===undefined||isNaN(n))return '<span class="zero">—</span>';
  if(Math.abs(n)<0.005)return '<span class="zero">—</span>';
  const neg=n<0,v=Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  return neg?`(${v})`:v;
}
function fmtPlain(n,dec=2){if(n==null||isNaN(n))return'';return n.toLocaleString('en-US',{minimumFractionDigits:dec,maximumFractionDigits:dec});}

/* ============================================================================
   CORE ENGINE  (ports of the Python functions)
   ============================================================================ */
function getRateAtDate(baseRate,rateEvents,serial){
  let eff=baseRate;
  for(const [ed,er] of (rateEvents||[]).slice().sort((a,b)=>a[0]-b[0])){ if(serial>=ed)eff=er; else break; }
  return eff;
}

function accrueInterest(startDate,endDate,startBalance,disbursements,baseRate,periodRate,rateEvents,basis){
  if(endDate<=startDate)return 0;
  if(!rateEvents||rateEvents.length===0){
    let acc=0,bal=startBalance,seg=startDate;
    for(const [d,amt] of disbursements.slice().sort((a,b)=>a[0]-b[0])){
      if(d>seg)acc+=bal*periodRate*(d-seg)/basis;
      bal+=amt; seg=d;
    }
    acc+=bal*periodRate*(endDate-seg)/basis;
    return acc;
  }
  let curRate=getRateAtDate(baseRate,rateEvents,startDate),bal=startBalance,seg=startDate,acc=0;
  const events=[];
  for(const [ed,er] of rateEvents){ if(startDate<ed&&ed<=endDate)events.push([ed,'rate',er]); }
  for(const [d,amt] of disbursements){ if(startDate<d&&d<=endDate)events.push([d,'disbursement',amt]); }
  events.sort((a,b)=> a[0]-b[0] || ((a[1]==='rate'?0:1)-(b[1]==='rate'?0:1)) );
  for(const [ed,typ,val] of events){
    if(ed>seg)acc+=bal*curRate*(ed-seg)/basis;
    if(typ==='rate')curRate=val; else bal+=val;
    seg=ed;
  }
  acc+=bal*curRate*(endDate-seg)/basis;
  return acc;
}

/* Day-by-day accrual for one period [startDate,endDate); sum == accrueInterest(). */
function dailyAccrualForPeriod(startDate,endDate,startBalance,disbursements,baseRate,periodRate,rateEvents,basis){
  const rows=[];
  const useRE=rateEvents&&rateEvents.length>0;
  for(let d=startDate;d<endDate;d++){
    let bal=startBalance,disbToday=0;
    for(const [dd,amt] of disbursements){ if(dd>startDate&&dd<=d)bal+=amt; if(dd===d)disbToday+=amt; }
    const rate=useRE?getRateAtDate(baseRate,rateEvents,d):periodRate;
    rows.push({date:d,dow:dow(d),opening:bal,rate,daily:bal*rate/basis,disb:disbToday});
  }
  return rows;
}

function generateSchedule(P){
  const baseRate=P.interest_rate, basis=P.day_count_basis;
  const intGrace=P.interest_grace_period_end, priGrace=P.principal_grace_period_end;
  const nInst=P.num_installments, ptype=P.principal_type;
  const capitalize=!!P.interest_capitalized, capUntil=P.interest_capitalized_until??null;
  const payFreq=P.payment_frequency||4;
  const periodRates=P.interest_rates_by_period||null;
  const rateEvents=P.interest_rate_change_events||[];
  const annuityRecalc=!!P.annuity_recalculate_on_rate_or_disbursement;
  const annuityUsePeriod=!!P.annuity_use_period_rate;
  const tdsMode=P.total_debt_service_mode||'cash';
  const tdsIncCap=!!P.total_debt_service_includes_capitalized_interest;
  const openingIncNew=P.opening_balance_includes_period_disbursements!==false;
  const dayAdj=P.interest_day_adjustments||[];
  const intOverride=P.interest_payment_amounts||null;
  const openOverride=P.opening_balance_amounts||null;
  const closeOverride=P.closing_balance_amounts||null;
  const pctSched=P.principal_schedule_percentages||null;
  const amtSched=P.principal_schedule_amounts||null;

  const disb=P.disbursements.slice().sort((a,b)=>a[0]-b[0]);
  const payDates=P.repayment_dates.slice().sort((a,b)=>a-b);
  if(periodRates&&periodRates.length!==payDates.length)throw new Error('interest_rates_by_period length must match repayment_dates.');

  const firstDD=disb[0][0];
  let balance=disb.filter(([d])=>d<=firstDD).reduce((s,[,a])=>s+a,0);
  let pending=disb.filter(([d])=>d>firstDD);

  let lastIntDate=firstDD, intBaseBal=balance, instPaid=0, cumInt=0, cumPri=0, annuityPmt=null;
  const rows=[];

  for(let i=0;i<payDates.length;i++){
    const payDate=payDates[i];
    const periodRate=periodRates?periodRates[i]:baseRate;
    const prevDate=i>0?payDates[i-1]:firstDD;

    const newPeriod=[],stillPending=[];
    for(const [d,amt] of pending){ if(prevDate<d&&d<=payDate)newPeriod.push([d,amt]); else stillPending.push([d,amt]); }
    pending=stillPending;
    const newTotal=newPeriod.reduce((s,[,a])=>s+a,0);
    let principalBase=balance+newTotal;
    let openingBal=openingIncNew?principalBase:balance;
    if(openOverride){ openingBal=openOverride[i]; principalBase=openingBal; }

    const isCapRow=(capUntil!==null&&payDate<=capUntil)||(capitalize&&payDate<=intGrace);
    const isDeferredZero=payDate<=intGrace&&!isCapRow;

    let interest=0,capInterest=0,intDateAdvanced=false,dailyRows=null;

    if(intOverride){
      const io=intOverride[i]; intDateAdvanced=true;
      if(isCapRow)capInterest=io; else interest=io;
    } else if(!isDeferredZero){
      const accDisb=disb.filter(([d])=>lastIntDate<d&&d<=payDate);
      let accrued=accrueInterest(lastIntDate,payDate,intBaseBal,accDisb,baseRate,periodRate,rateEvents,basis);
      dailyRows=dailyAccrualForPeriod(lastIntDate,payDate,intBaseBal,accDisb,baseRate,periodRate,rateEvents,basis);
      for(const adj of dayAdj){
        if(adj.pay_date===payDate){
          const mode=adj.balance||'opening_balance';
          const ab=mode==='interest_base_balance'?intBaseBal:mode==='principal_base'?principalBase:openingBal;
          accrued+=ab*(adj.rate??periodRate)*(adj.days??0)/basis;
        }
      }
      intDateAdvanced=true;
      if(isCapRow)capInterest=accrued; else interest=accrued;
    }

    const remaining=nInst-instPaid;
    let principal=0;
    if(payDate<=priGrace||remaining<=0){
      principal=0;
    } else {
      if(ptype==='Annuity'){
        let reset=annuityPmt===null;
        if(annuityPmt!==null&&annuityRecalc){
          const prevPR=(periodRates&&i>0)?periodRates[i-1]:periodRate;
          reset=newPeriod.length>0||periodRate!==prevPR;
        }
        if(reset){ const rForPmt=annuityUsePeriod?periodRate:baseRate; const rq=rForPmt/payFreq;
          annuityPmt=principalBase*rq/(1-Math.pow(1+rq,-remaining)); }
        principal=remaining===1?principalBase:annuityPmt-interest;
      } else if(ptype==='PPMT Principal'||ptype==='Quarterly Installment'||ptype==='PPMT'){
        if(annuityPmt===null){ const rq=baseRate/payFreq; annuityPmt=principalBase*rq/(1-Math.pow(1+rq,-nInst)); }
        const perInt=principalBase*(baseRate/payFreq);
        principal=remaining===1?principalBase:annuityPmt-perInt;
      } else if(ptype==='Scheduled Percentage Principal'||ptype==='Scheduled Principal'||ptype==='Percentage Schedule'){
        if(amtSched)principal=amtSched[instPaid]; else principal=P.loan_amount*pctSched[instPaid];
        if(remaining===1)principal=principalBase;
      } else { principal=principalBase/remaining; }
      instPaid++;
    }

    let closingBal=principalBase+capInterest-principal;
    if(closeOverride)closingBal=closeOverride[i];
    cumInt+=interest; cumPri+=principal;
    const shownInt=capInterest+interest;

    let tds;
    if(tdsMode==='annuity_pmt'&&ptype==='Annuity'&&annuityPmt!==null&&payDate>priGrace)tds=annuityPmt;
    else if(tdsIncCap)tds=shownInt+principal;
    else tds=interest+principal;

    rows.push({idx:i,payDate,periodStart:prevDate,openingBal,periodRate,
      interest:shownInt,cashInterest:interest,capInterest,cumInt,principal,cumPri,tds,closingBal,
      isCapRow,isGrace:payDate<=priGrace,isIntGrace:payDate<=intGrace,newDisb:newTotal,dailyRows,days:payDate-prevDate});

    balance=closingBal;
    if(intDateAdvanced){ lastIntDate=payDate; intBaseBal=closingBal; }
  }
  return rows;
}

/* ============================================================================
   HOLIDAY / BUSINESS-DAY ADJUSTMENT
   ============================================================================ */
function isBusinessDay(s,holidaySet,weekend){ if(weekend.includes(dow(s)))return false; if(holidaySet.has(s))return false; return true; }
function adjustBD(s,rule,holidaySet,weekend){
  if(rule==='none'||weekend.length===0&&holidaySet.size===0)return s;
  if(rule==='none')return s;
  const step=rule==='preceding'?-1:1;
  let x=s,g=0;
  while(!isBusinessDay(x,holidaySet,weekend)&&g<200){ x+=step; g++; }
  return x;
}

function loadBangladeshHolidays(){
  const fixed=[['02-21','Mother Language Day'],['03-26','Independence Day'],['04-14','Pahela Boishakh'],
    ['05-01','May Day'],['08-15','National Mourning Day'],['12-16','Victory Day'],['12-25','Christmas Day']];
  const ex=new Set(form.holidays.map(h=>h.date));
  for(let y=2024;y<=2030;y++)for(const[md,nm]of fixed){const dt=`${y}-${md}`;if(!ex.has(dt)){form.holidays.push({date:dt,name:nm});ex.add(dt);}}
  renderHoliRows();toast('Loaded fixed Bangladesh public holidays 2024–2030. Add Eid/lunar dates manually.');
}

/* ============================================================================
   BUILD PARAMS → ENGINE
   ============================================================================ */
function buildParams(){
  const f=form;
  const fc=isoToSerial(f.financial_close);if(fc===null)throw 'Enter the Financial Close / Agreement date.';
  const amt=num(f.loan_amount);if(amt===null)throw 'Enter the sanctioned amount.';
  const rate=num(f.interest_rate);if(rate===null)throw 'Enter the interest rate.';
  const nInst=Math.round(num(f.num_installments)||0);if(!nInst)throw 'Enter number of installments.';
  const disb=f.disbursements.filter(d=>d.date&&num(d.amount)!=null).map(d=>[isoToSerial(d.date),num(d.amount),d.note||'']);
  if(!disb.length)throw 'Add at least one disbursement (date + amount).';
  disb.sort((a,b)=>a[0]-b[0]);

  let ige=isoToSerial(f.interest_grace_period_end),pge=isoToSerial(f.principal_grace_period_end);
  const igm=num(f.interest_grace_months),pgm=num(f.principal_grace_months);
  if(ige===null)ige=igm!=null?addMonthsSerial(fc,Math.round(igm)):fc;
  if(pge===null)pge=pgm!=null?addMonthsSerial(fc,Math.round(pgm)):fc;

  const weekend=f.weekend_fri_sat?[5,6]:f.weekend_sat_sun?[6,0]:[];
  const holidaySet=new Set(f.holidays.filter(h=>h.date).map(h=>isoToSerial(h.date)));

  let payDates=[];
  if(f.gen_mode==='manual'){
    payDates=f.manual_dates.filter(Boolean).map(isoToSerial);
    if(!payDates.length)throw 'Add repayment dates (manual mode) or switch to auto-generate.';
  } else {
    const first=isoToSerial(f.first_payment);if(first===null)throw 'Enter the first payment date (auto mode).';
    const freq=f.payment_frequency,stepMonths=12/freq,pday=Math.round(num(f.payment_day)||serialToDate(first).getUTCDate());
    payDates.push(first);let cur=first;
    for(let k=1;k<nInst;k++){cur=addMonthsSerial(cur,stepMonths,pday);payDates.push(cur);}
  }
  payDates=payDates.map(s=>adjustBD(s,f.bd_rule,holidaySet,weekend)).sort((a,b)=>a-b);

  const rateEvents=f.rate_events.filter(r=>r.date&&num(r.rate)!=null).map(r=>[isoToSerial(r.date),num(r.rate)/100]).sort((a,b)=>a[0]-b[0]);

  let pctSched=null,amtSched=null;
  if(f.principal_type==='Scheduled Percentage Principal'){
    pctSched=f.pct_sched.filter(v=>v!=='').map(v=>num(v)/100);
    if(pctSched.length!==nInst)throw `Percentage schedule has ${pctSched.length} rows but ${nInst} installments.`;
  } else if(f.principal_type==='Scheduled Principal'){
    amtSched=f.amt_sched.filter(v=>v!=='').map(num);
    if(amtSched.length!==nInst)throw `Amount schedule has ${amtSched.length} rows but ${nInst} installments.`;
  }

  const P={project_name:f.project_name||'Untitled Loan',currency:f.currency,loan_amount:amt,
    financial_close:fc,interest_rate:rate/100,day_count_basis:+f.day_count_basis,num_installments:nInst,
    principal_type:f.principal_type,payment_frequency:+f.payment_frequency,
    interest_grace_period_end:ige,principal_grace_period_end:pge,
    interest_capitalized:f.interest_capitalized,
    interest_capitalized_until:f.interest_capitalized_until?isoToSerial(f.interest_capitalized_until):null,
    opening_balance_includes_period_disbursements:f.opening_balance_includes_period_disbursements,
    disbursements:disb.map(d=>[d[0],d[1]]),disb_notes:disb.map(d=>d[2]),repayment_dates:payDates,
    interest_rate_change_events:rateEvents,principal_schedule_percentages:pctSched,principal_schedule_amounts:amtSched,
    annuity_recalculate_on_rate_or_disbursement:f.annuity_recalculate_on_rate_or_disbursement,
    annuity_use_period_rate:f.annuity_use_period_rate,
    total_debt_service_includes_capitalized_interest:f.total_debt_service_includes_capitalized_interest,
    _holidaySet:holidaySet,_weekend:weekend,_bd_rule:f.bd_rule,
    _due_date_include:f.due_date_include,_exclude_open:f.exclude_open,_exclude_close:f.exclude_close};

  // merge exact workbook-only extras (from a loaded example) so recompute stays faithful
  if(f._exact){ for(const k in f._exact) P[k]=JSON.parse(JSON.stringify(f._exact[k])); }
  if(f.due_date_include){ P.interest_day_adjustments=payDates.map(pd=>({pay_date:pd,balance:'opening_balance',days:1})); }
  return P;
}

function compute(){
  let P;try{P=buildParams();}catch(e){toast('⚠ '+e);return;}
  try{
    const rows=generateSchedule(P);
    state.params=P;state.schedule=rows;
    if(state.activeVersion===-1)snapshotVersion('Initial computation','initial');
    document.getElementById('versionSel').style.display='';
    document.getElementById('statusline').style.display='';
    render();
    toast('✓ Schedule computed — '+rows.length+' periods. Click any period row to expand daily accrual.');
  }catch(e){console.error(e);toast('⚠ Engine error: '+e.message);}
}

function snapshotVersion(desc,tag){
  state.versions.push({desc,tag,when:new Date().toLocaleString(),
    form:JSON.parse(JSON.stringify(form)),
    params:state.params?JSON.parse(JSON.stringify({...state.params,_holidaySet:[...(state.params._holidaySet||[])]})):null,
    schedule:state.schedule?JSON.parse(JSON.stringify(state.schedule)):null});

/* Full daily schedule */
let dayPage=0;
function renderDaily(){
  const S=state.schedule;
  document.getElementById('viewbar').innerHTML=
    `Jump:<input type="date" id="jumpDate"> Show:<select id="dayPer"><option value="60">60/page</option><option value="120">120</option><option value="365">365</option><option value="999999">All</option></select>`;
  const allDays=[];for(const r of S)if(r.dailyRows)for(const d of r.dailyRows)allDays.push({...d,period:r.idx,payDate:r.payDate});
  const payInfo={};S.forEach(r=>payInfo[r.payDate]=r);
  const per=()=>parseInt(document.getElementById('dayPer').value||60);
  renderDailyPage(allDays,payInfo,per());
  document.getElementById('dayPer').addEventListener('change',()=>{dayPage=0;renderDailyPage(allDays,payInfo,per());});
  document.getElementById('jumpDate').addEventListener('change',e=>{
    const s=isoToSerial(e.target.value),idx=allDays.findIndex(d=>d.date>=s);
    if(idx>=0){dayPage=Math.floor(idx/per());renderDailyPage(allDays,payInfo,per());}});
}
function renderDailyPage(allDays,payInfo,per){
  const P=state.params,total=allDays.length,pages=Math.max(1,Math.ceil(total/per));
  dayPage=Math.min(Math.max(0,dayPage),pages-1);
  const slice=allDays.slice(dayPage*per,dayPage*per+per);
  let body='',acc=0,lastP=slice.length?slice[0].period:0;
  for(const d of slice){
    if(d.period!==lastP){acc=0;lastP=d.period;}
    acc+=d.daily;
    const we=P._weekend.includes(d.dow),hol=P._holidaySet.has(d.date),pr=payInfo[d.date];
    body+=`<tr class="dayrow${we?' weekend':''}${hol?' holiday':''}${d.disb>0?' disb':''}">
      <td class="l">${fmtDate(d.date)}${hol?' 🏖':''}</td><td>${DOW[d.dow]}</td><td>P${d.period+1}</td><td>${(d.rate*100).toFixed(3)}</td>
      <td>${fmt(d.opening)}</td><td>${d.disb>0?fmt(d.disb):'<span class="zero">—</span>'}</td>
      <td>${fmt(d.daily,2)}</td><td>${fmt(acc,2)}</td>
      <td class="l">${pr?(pr.principal>0?'<span class="tag pay">PRIN '+fmtPlain(pr.principal,0)+'</span> ':'')+'<span class="tag cap">INT due '+fmtPlain(pr.interest,0)+'</span>':''}</td></tr>`;
  }
  document.getElementById('content').innerHTML=`<div class="tbl-wrap"><table class="sched"><thead><tr>
    <th class="l">Date</th><th>DoW</th><th>Period</th><th>Rate %</th><th>Opening Principal</th><th>Disbursement</th>
    <th>Daily Interest</th><th>Accrued (since pay)</th><th class="l">Due on date</th></tr></thead><tbody>${body}</tbody></table></div>
    <div class="note" style="padding:8px 2px;display:flex;justify-content:space-between;align-items:center">
      <span>Days ${total?dayPage*per+1:0}–${Math.min(dayPage*per+per,total)} of ${total} (page ${dayPage+1}/${pages})</span>
      <span><button class="vb" id="prevPg">◀ Prev</button> <button class="vb" id="nextPg">Next ▶</button></span></div>`;
  document.getElementById('prevPg').addEventListener('click',()=>{if(dayPage>0){dayPage--;renderDailyPage(allDays,payInfo,per);}});
  document.getElementById('nextPg').addEventListener('click',()=>{if(dayPage<pages-1){dayPage++;renderDailyPage(allDays,payInfo,per);}});
}

  const last=S[S.length-1],tenorDays=last.payDate-P.disbursements[0][0];

    <div class="card"><div class="k">Tenor</div><div class="v">${(tenorDays/365).toFixed(1)} yr</div><div class="sub">${fmtDate(P.disbursements[0][0])} → ${fmtDate(last.payDate)}</div></div></div>
    <div class="chartbox"><h3>Outstanding Principal &amp; Cumulative Interest</h3><canvas id="amChart" width="900" height="320" style="width:100%;max-width:100%"></canvas></div>`;
  drawChart(S);

function drawChart(S){
  const cv=document.getElementById('amChart');if(!cv)return;const ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,pad=46;ctx.clearRect(0,0,W,H);
  const xs=S.map(r=>r.payDate),x0=Math.min(...xs),x1=Math.max(...xs);
  const maxBal=Math.max(...S.map(r=>r.closingBal),...S.map(r=>r.openingBal),1),maxCum=Math.max(...S.map(r=>r.cumInt),1);
  const X=s=>pad+(s-x0)/(x1-x0||1)*(W-2*pad),Yb=v=>H-pad-v/maxBal*(H-2*pad),Yc=v=>H-pad-v/maxCum*(H-2*pad);
  ctx.strokeStyle='#e7ecf3';ctx.lineWidth=1;ctx.font='10px Segoe UI';
  for(let i=0;i<=4;i++){const y=pad+i*(H-2*pad)/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke();}
  ctx.strokeStyle='#1a56b0';ctx.lineWidth=2.2;ctx.beginPath();S.forEach((r,i)=>{const x=X(r.payDate),y=Yb(r.closingBal);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();
  ctx.strokeStyle='#0f6e4d';ctx.lineWidth=2.2;ctx.setLineDash([5,4]);ctx.beginPath();S.forEach((r,i)=>{const x=X(r.payDate),y=Yc(r.cumInt);i?ctx.lineTo(x,y):ctx.moveTo(x,y);});ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#1a56b0';ctx.fillText('● Outstanding principal',pad,18);
  ctx.fillStyle='#0f6e4d';ctx.fillText('- - Cumulative interest',pad+170,18);
  ctx.fillStyle='#8794a6';ctx.fillText(fmtDate(x0),pad,H-pad+16);ctx.fillText(fmtDate(x1),W-pad-60,H-pad+16);
}

function applyEvent(kind){
  if(!state.schedule){toast('Compute a base schedule first.');return;}
  if(kind==='rate'){const d=document.getElementById('ev_rate_date').value,v=num(document.getElementById('ev_rate_val').value);

  const newInst=Math.round(num(document.getElementById('ev_rs_inst').value)||0),newFirst=document.getElementById('ev_rs_first').value;

}

/* Build a display form from an exact engine parameter set (for the left panel). */
function buildFormFromData(d){
  const f=blankForm();
  const r6=x=>String(parseFloat((x*100).toFixed(8)));
  f.project_name=d.project_name; f.currency=d.currency||'BDT';
  f.loan_amount=String(d.loan_amount); f.financial_close=serialToISO(d.financial_close);
  f.interest_rate=r6(d.interest_rate); f.day_count_basis=d.day_count_basis;
  f.num_installments=String(d.num_installments); f.principal_type=d.principal_type;
  f.payment_frequency=d.payment_frequency||4;
  f.interest_grace_period_end=serialToISO(d.interest_grace_period_end);
  f.principal_grace_period_end=serialToISO(d.principal_grace_period_end);
  f.interest_capitalized=!!d.interest_capitalized;
  if(d.interest_capitalized_until!=null) f.interest_capitalized_until=serialToISO(d.interest_capitalized_until);
  f.opening_balance_includes_period_disbursements=d.opening_balance_includes_period_disbursements!==false;
  f.annuity_recalculate_on_rate_or_disbursement=!!d.annuity_recalculate_on_rate_or_disbursement;
  f.annuity_use_period_rate=!!d.annuity_use_period_rate;
  f.total_debt_service_includes_capitalized_interest=!!d.total_debt_service_includes_capitalized_interest;
  f.gen_mode='manual';
  f.manual_dates=d.repayment_dates.map(serialToISO);
  f.disbursements=d.disbursements.map((dd,i)=>({date:serialToISO(dd[0]),amount:String(dd[1]),note:'DD'+(i+1)}));
  f.rate_events=(d.interest_rate_change_events||[]).map(e=>({date:serialToISO(e[0]),rate:r6(e[1])}));
  if(d.principal_schedule_percentages) f.pct_sched=d.principal_schedule_percentages.map(r6);
  if(d.principal_schedule_amounts) f.amt_sched=d.principal_schedule_amounts.map(String);
  // exact engine extras not expressible by standard form controls — preserved so recompute stays exact
  f._exact={};
  for(const k of ['interest_rates_by_period','interest_payment_amounts','opening_balance_amounts','closing_balance_amounts','interest_day_adjustments','total_debt_service_mode'])
    if(k in d) f._exact[k]=JSON.parse(JSON.stringify(d[k]));
  return f;
}
function loadExample(k){
  const d=EX_DATA[k]; if(!d) return;
  form=buildFormFromData(d);
  state.versions=[]; state.activeVersion=-1; state.schedule=null; expandedPeriods.clear();
  renderLeft();
  // compute directly from the exact parameter set for guaranteed fidelity to the workbook
  const P=Object.assign({},JSON.parse(JSON.stringify(d)),
    {_holidaySet:new Set(),_weekend:[],_bd_rule:'none',_due_date_include:false,_exclude_open:true,_exclude_close:true});
  state.params=P; state.schedule=generateSchedule(P);
  snapshotVersion('Loaded: '+d.project_name,'example');
  document.getElementById('versionSel').style.display='';
  document.getElementById('statusline').style.display='';
  render();
  toast('✓ Loaded '+d.project_name+' — '+state.schedule.length+' periods (matches reference engine).');
}
(function(){const sel=document.getElementById('exampleSel');
  for(const k of EX_ORDER){ if(!EX_DATA[k])continue; const o=document.createElement('option');o.value=k;o.textContent=EX_LABELS[k]||k;sel.appendChild(o); }
  sel.addEventListener('change',()=>{const k=sel.value;if(!k)return;loadExample(k);sel.value='';});})();
